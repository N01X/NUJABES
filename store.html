    <header class="header">

    <hr>
    <section class="container content-section">

        <h2 class="section-header">MUSIC</h2>
        <div class="shop-items">
            <div class="shop-item">
                
                <span class="shop-item-title">Luv(sic)</span>
                <img class="shop-item-img" src="images/Albums/Luv-sic.jpg" alt="Luv sic" width="400"> 


                <div class="shop-item-details">
                    <span class="shop-item-price">$50</span> 
                    <button class="btn btn-primary shop-item-btn" role="button">ADD TO CART</button>
                </div>

            </div>

            <div class="shop-item">

                    <span class="shop-item-price">$50</span>

            </div>



            <div class="shop-item">
                <span  class="shop-item-title">Modal Soul</span>

                    <span class="shop-item-price">$50</span> 
                    <button class="btn btn-primary shop-item-btn" role="button">ADD TO CART</button>
                </div>
            </div>



            <div class="shop-item">
                <span class="shop-item-title">Spiritual State</span>
                <img class="shop-item-img" src="images/Albums/Spiritual-State.jpg" alt="Spiritual State" width="400"> 
                <div class="shop-item-details">
                    <span class="shop-item-price">$50</span> 
                    <button class="btn btn-primary shop-item-btn" role="button">ADD TO CART</button>
                </div>
            </div>
    </div>
    </section>



    <section class="container content-section">

        <h2 class="section-header">MERCH</h2>
        <div class="shop-items">
            <div class="shop-item">
                <span class="shop-item-title">T-shirt 1</span>
                <img class="shop-item-img" src="images/Merch/1.jpg" alt="T-shirt 1" width="400"> 
                <div class="shop-item-details">
                    <span class="shop-item-price">$50</span> 
                    <button class="btn btn-primary shop-item-btn" role="button">ADD TO CART</button>
                </div>
            </div>


            <div class="shop-item">
                <span class="shop-item-title">T-shirt 2</span>
                <img class="shop-item-img" src="images/Merch/2.jpg" alt="T-shirt 2" width="400"> 
                <div class="shop-item-details">
                    <span class="shop-item-price">$50</span> 
                    <button class="btn btn-primary shop-item-btn" role="button">ADD TO CART</button>
                </div>
            </div>

        </div>
    </section>


    <section class="container content-section">

        <h2 class="section-header">Cart</h2>
        <div class="cart-items">
            <div class="cart-row">

                <span class="cart-item cart-header cart-col">ITEM</span>
                <span class="cart-item cart-header cart-col">PRICE</span>
                <span class="cart-item cart-header cart-col">QUANTITY</span>
            </div>

            <div class="cart-row">
                <div class="cart-item cart-col">

                    <img class="cart-item-image" src="images/Merch/1.jpg">
                    <span class="cart-item-title">T-shirt 1</span>
                </div>
                <span class="cart-price cart-col">$50</span>

                <div class="cart-col cart-quantity">
                    <input class="cart-input" type="number" name="quantity" value="1">
                    <button class="btn btn-danger" role="button">Remove</button>
                </div>

            </div>

            <div class="cart-row">

                <div class="cart-item cart-col">
                    <img class="cart-item-image"  src="images/Merch/2.jpg">
                    <span class="cart-item-title">T-shirt 2</span>
                </div>

                <span class="cart-price cart-col">$50</span>

                <div class="cart-col cart-quantity">
                    <input class="cart-input" type="number" name="quantity" value="1">

                    <button class="btn btn-danger " role="button">Remove</button>
                </div>
            </div>
        </div>
        
        <div class="cart-total">
            <strong class="cart-total-title">Total</strong>
            <span class="cart-total-price">$50</span>
        </div>

        <button class="btn btn-primary btn-purchase" role="button">PURCHASE</button>

    </section>
